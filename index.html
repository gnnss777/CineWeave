<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" fill="#d4a359" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#863bff" />
    <meta name="description" content="Plataforma interativa para cineastas e roteiristas. Transforme gravações de áudio e esboços de mapas mentais em roteiros clássicos de Hollywood e perfis detalhados de personagens." />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CineWeave" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="CineWeave" />

    <title>CineWeave - Brainstorm, Mind Maps & Hollywood Screenplay Editor</title>

    <script>
      window.__deferredPrompt = null;
      window.__deferredPromptFired = false;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__deferredPrompt = e;
        window.__deferredPromptFired = true;
      });
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var registration of registrations) {
            registration.unregister();
          }
        }).catch(function(){});
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
