name: Deploy

# NOTE: Vercel's native GitHub integration handles production deploys
# automatically when you push to master. This workflow exists as a
# safety-net / manual trigger if you ever need to redeploy without
# a new commit.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  deploy:
    name: Redeploy on Vercel
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Vercel Deploy Hook
        run: |
          echo "To redeploy without a new commit, set up a Vercel Deploy Hook at:"
          echo "  https://vercel.com/gnnssart-3396s-projects/cineweave/settings/git"
          echo ""
          echo "Then add VERCEL_DEPLOY_HOOK as a GitHub secret and uncomment below:"
          echo "  curl -X POST \"${{ secrets.VERCEL_DEPLOY_HOOK }}\""
          echo ""
          echo "Or just push an empty commit:"
          echo "  git commit --allow-empty -m 'chore: trigger deploy'"
